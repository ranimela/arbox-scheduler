name: Arbox Scheduler Agent

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  # schedule:
  #   # Spaced triggers to guarantee at least one wakes up before 21:00 Israel Time
  #   - cron: '30 13 * * *' # 16:30 Israel
  #   - cron: '0 14 * * *'  # 17:00 Israel
  #   - cron: '30 14 * * *' # 17:30 Israel
  #   - cron: '0 15 * * *'  # 18:00 Israel
  #   - cron: '30 15 * * *' # 18:30 Israel
  #   - cron: '0 16 * * *'  # 19:00 Israel
  #   - cron: '30 16 * * *' # 19:30 Israel
  #   - cron: '0 17 * * *'  # 20:00 Israel
  #   - cron: '30 17 * * *' # 20:30 Israel
  
  workflow_dispatch:

jobs:
  run-arbox-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Arbox Scheduler Agent
        env:
          ARBOX_BOX_ID: ${{ secrets.ARBOX_BOX_ID }}
          ARBOX_LOCATION_ID: ${{ secrets.ARBOX_LOCATION_ID }}
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          ARBOX_USER_ID: ${{ secrets.ARBOX_USER_ID }}
          ARBOX_MEMBERSHIP_USER_ID: ${{ secrets.ARBOX_MEMBERSHIP_USER_ID }}
          ARBOX_NTFY_TOPIC: ${{ secrets.ARBOX_NTFY_TOPIC }}
          TARGET_DAYS: ${{ vars.TARGET_DAYS }}
          TARGET_HOUR: ${{ vars.TARGET_HOUR }}
        run: |
          python fetch_schedule.py

      - name: Send Run Failure Alert via ntfy
        if: failure()
        run: |
          curl -H "Title: ❌ Arbox Workflow Failed" \
               -H "Priority: high" \
               -H "Tags: warning,github" \
               -d "The Arbox Scheduler workflow run has failed. Check run logs for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               https://ntfy.sh/${{ secrets.ARBOX_NTFY_TOPIC || 'arbox-scheduler-ranimela' }}
