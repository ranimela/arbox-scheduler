name: Arbox Scheduler Agent

on:
  schedule:
    # Runs at 07:00 UTC (10:00 AM Israel Time) every Tuesday and Thursday
    # Change these numbers to match when your gym opens class registration!
    # Format: minute hour day_of_month month day_of_week
    - cron: '0 7 * * 2,4'
  
  # This allows you to trigger the run manually from the GitHub website
  workflow_dispatch:

jobs:
  run-arbox-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Arbox Scheduler Agent
        env:
          # These environment variables will be securely pulled from your GitHub Secrets
          ARBOX_BOX_ID: ${{ secrets.ARBOX_BOX_ID }}
          ARBOX_LOCATION_ID: ${{ secrets.ARBOX_LOCATION_ID }}
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          ARBOX_USER_ID: ${{ secrets.ARBOX_USER_ID }}
        run: |
          python fetch_schedule.py
