name: Arbox Scheduler Agent

on:
  push:
    branches: [main]
  schedule:
    # Runs at 17:00 UTC (20:00 Israel Time) every day
    # Arriving 1 hour early to beat GitHub's massive delays
    - cron: '0 17 * * *'
  
  workflow_dispatch:

jobs:
  run-arbox-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Arbox Scheduler Agent
        env:
          ARBOX_BOX_ID: ${{ secrets.ARBOX_BOX_ID }}
          ARBOX_LOCATION_ID: ${{ secrets.ARBOX_LOCATION_ID }}
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          ARBOX_USER_ID: ${{ secrets.ARBOX_USER_ID }}
          ARBOX_MEMBERSHIP_USER_ID: ${{ secrets.ARBOX_MEMBERSHIP_USER_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TARGET_DAYS: ${{ vars.TARGET_DAYS }}
          TARGET_HOUR: ${{ vars.TARGET_HOUR }}
        run: |
          python fetch_schedule.py
