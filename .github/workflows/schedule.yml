name: Arbox Scheduler Agent

on:
  schedule:
    # Runs at 18:00 UTC (21:00 Israel Time) every day
    # This matches when registration opens for classes 7 days ahead
    - cron: '0 18 * * *'
  
  workflow_dispatch:

jobs:
  run-arbox-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Arbox Scheduler Agent
        env:
          ARBOX_BOX_ID: ${{ secrets.ARBOX_BOX_ID }}
          ARBOX_LOCATION_ID: ${{ secrets.ARBOX_LOCATION_ID }}
          ARBOX_EMAIL: ${{ secrets.ARBOX_EMAIL }}
          ARBOX_PASSWORD: ${{ secrets.ARBOX_PASSWORD }}
          ARBOX_USER_ID: ${{ secrets.ARBOX_USER_ID }}
          ARBOX_MEMBERSHIP_USER_ID: ${{ secrets.ARBOX_MEMBERSHIP_USER_ID }}
        run: |
          python fetch_schedule.py
